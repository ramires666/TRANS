# Конфигурация конвейера перевода PDF (ZH -> RU)
pdf_path: "海康机器人千兆网口工业面阵相机用户手册V3.0.4.pdf"
out_path: "_RU.pdf"

# LLM (OpenAI-совместимый эндпоинт)
llm_base_url: "http://127.0.0.1:8080/v1"
llm_api_key: "not-needed"
llm_model: "Qwen3.6-35B-A3B-UD-Q3_K_M.gguf"
enable_thinking: false
max_tokens: 4096
temperature: 0.2
top_p: 0.9
request_timeout: 300

# Параллелизм
workers: 2

# Каталоги
tmp_dir: "intermediate"
log_dir: "log"

# Глоссарий
glossary_path: "glossary.csv"

# Кэш переводов
cache_db: "intermediate/translations.db"

# Шрифт для кириллицы (TTF). Пусто -> авто-поиск DejaVuSans/Arial/Noto
cyrillic_font: ""

# Промежуточные файлы
parse_path: "intermediate/parse.json"
segments_path: "intermediate/segments.json"
errors_path: "log/errors.jsonl"
log_path: "log/translate.log"

# Перевод: ограничение длины сегмента (символы)
max_segment_chars: 1500

# Сборка: предел автосжатия шрифта
builder_min_fontsize: 6.0
builder_default_fontsize: 10.0

# Метаданные результата
metadata:
  title: "Промышленная камера Hikrobot с гигабитным интерфейсом. Руководство пользователя"
  author: "Hikrobot"
  subject: "Руководство пользователя промышленной камеры (перевод ZH->RU)"
  keywords: "Hikrobot, GigE, промышленная камера, машинное зрение"
